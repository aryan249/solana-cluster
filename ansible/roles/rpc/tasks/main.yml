---
- name: Fetch RPC node identity keypair from bootstrap
  fetch:
    src: "/tmp/keypairs/bootstrap-identity-pubkey.txt"
    dest: "/tmp/fetched-keypairs/bootstrap-identity-pubkey.txt"
    flat: yes
  delegate_to: "{{ groups['bootstrap'][0] }}"

- name: Fetch genesis hash from bootstrap
  fetch:
    src: "/tmp/keypairs/genesis-hash.txt"
    dest: "/tmp/fetched-keypairs/genesis-hash.txt"
    flat: yes
  delegate_to: "{{ groups['bootstrap'][0] }}"

- name: Read genesis hash
  set_fact:
    genesis_hash: "{{ lookup('file', '/tmp/fetched-keypairs/genesis-hash.txt') }}"

- name: Read bootstrap identity pubkey
  set_fact:
    bootstrap_identity_pubkey: "{{ lookup('file', '/tmp/fetched-keypairs/bootstrap-identity-pubkey.txt') }}"

- name: Generate RPC node identity keypair
  command: /usr/local/bin/solana-keygen new --no-bip39-passphrase -o {{ keypair_path }}/identity.json
  args:
    creates: "{{ keypair_path }}/identity.json"
  become: true
  become_user: solana

- name: Stop solana-rpc if running
  systemd:
    name: solana-rpc
    state: stopped
  ignore_errors: true

- name: Clean RPC ledger for fresh sync
  file:
    path: "{{ ledger_path }}/{{ item }}"
    state: absent
  loop:
    - accounts
    - accounts_hash_cache
    - rocksdb
    - snapshot
  ignore_errors: true

- name: Deploy RPC node systemd service
  template:
    src: solana-rpc.service.j2
    dest: /etc/systemd/system/solana-rpc.service
    owner: root
    group: root
    mode: "0644"

- name: Reload systemd daemon
  systemd:
    daemon_reload: yes

- name: Start solana-rpc via shell to capture output
  shell: |
    systemctl enable solana-rpc
    systemctl start solana-rpc
    sleep 5
    if systemctl is-active solana-rpc; then
      echo "RPC service is running"
    else
      echo "RPC failed to start, checking log..."
      tail -20 /var/log/solana/validator.log
      echo "Retrying start..."
      rm -rf /ledger/*
      systemctl restart solana-rpc
      sleep 10
      systemctl is-active solana-rpc && echo "RPC started on retry" || echo "RPC still failing"
    fi
  register: rpc_start_result

- name: Display RPC start result
  debug:
    msg: "{{ rpc_start_result.stdout_lines }}"

- name: Wait for RPC node to be healthy
  uri:
    url: "http://127.0.0.1:{{ rpc_port }}/health"
    method: GET
    return_content: yes
  register: rpc_health
  until: rpc_health.status == 200
  retries: 60
  delay: 15
  ignore_errors: true

- name: Display RPC health status
  debug:
    msg: "RPC node health: {{ rpc_health.content | default('not yet healthy - will recover via systemd restart') }}"
