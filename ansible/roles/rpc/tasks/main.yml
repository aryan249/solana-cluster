---
- name: Fetch RPC node identity keypair from bootstrap
  fetch:
    src: "/tmp/keypairs/bootstrap-identity-pubkey.txt"
    dest: "/tmp/fetched-keypairs/bootstrap-identity-pubkey.txt"
    flat: yes
  delegate_to: "{{ groups['bootstrap'][0] }}"

- name: Fetch genesis hash from bootstrap
  fetch:
    src: "/tmp/keypairs/genesis-hash.txt"
    dest: "/tmp/fetched-keypairs/genesis-hash.txt"
    flat: yes
  delegate_to: "{{ groups['bootstrap'][0] }}"

- name: Read genesis hash
  set_fact:
    genesis_hash: "{{ lookup('file', '/tmp/fetched-keypairs/genesis-hash.txt') }}"

- name: Read bootstrap identity pubkey
  set_fact:
    bootstrap_identity_pubkey: "{{ lookup('file', '/tmp/fetched-keypairs/bootstrap-identity-pubkey.txt') }}"

- name: Check if RPC service exists and is failed (replacement scenario)
  shell: systemctl is-failed solana-rpc 2>/dev/null || echo "not-found"
  register: rpc_failed_check
  changed_when: false
  ignore_errors: true

- name: Clean ledger for fresh sync (replacement scenario)
  shell: |
    systemctl stop solana-rpc 2>/dev/null || true
    rm -rf {{ ledger_path }}/accounts {{ ledger_path }}/rocksdb {{ ledger_path }}/snapshot {{ ledger_path }}/accounts_hash_cache {{ ledger_path }}/accounts_index
  when: rpc_failed_check.stdout == "failed"
  become: true

- name: Generate RPC node identity keypair
  command: /usr/local/bin/solana-keygen new --no-bip39-passphrase -o {{ keypair_path }}/identity.json
  args:
    creates: "{{ keypair_path }}/identity.json"
  become: true
  become_user: solana

- name: Deploy RPC node systemd service
  template:
    src: solana-rpc.service.j2
    dest: /etc/systemd/system/solana-rpc.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart solana-rpc

- name: Reload systemd daemon
  systemd:
    daemon_reload: yes

- name: Enable and start solana-rpc
  systemd:
    name: solana-rpc
    enabled: yes
    state: started

- name: Wait for RPC process to be running
  shell: systemctl is-active solana-rpc
  register: rpc_active
  until: rpc_active.rc == 0
  retries: 30
  delay: 10
  changed_when: false
  ignore_errors: true

- name: Display RPC service status
  debug:
    msg: "RPC node is running. It will sync and serve RPC once caught up with the cluster."
