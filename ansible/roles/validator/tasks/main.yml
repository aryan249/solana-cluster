---
# ------------------------------------------------------------------
# Phase 1: Generate keypairs on bootstrap (delegated)
# This runs ON the bootstrap node even when --limit targets a new validator.
# ------------------------------------------------------------------
- name: Generate identity keypair on bootstrap for this validator
  command: /usr/local/bin/solana-keygen new --no-bip39-passphrase -o {{ keypair_path }}/validator-{{ inventory_hostname }}-identity.json
  args:
    creates: "{{ keypair_path }}/validator-{{ inventory_hostname }}-identity.json"
  delegate_to: "{{ groups['bootstrap'][0] }}"
  become: true
  become_user: solana

- name: Generate vote-account keypair on bootstrap for this validator
  command: /usr/local/bin/solana-keygen new --no-bip39-passphrase -o {{ keypair_path }}/validator-{{ inventory_hostname }}-vote-account.json
  args:
    creates: "{{ keypair_path }}/validator-{{ inventory_hostname }}-vote-account.json"
  delegate_to: "{{ groups['bootstrap'][0] }}"
  become: true
  become_user: solana

- name: Get bootstrap identity pubkey for vote account creation
  command: /usr/local/bin/solana-keygen pubkey {{ keypair_path }}/identity.json
  register: bootstrap_pubkey_for_vote
  changed_when: false
  delegate_to: "{{ groups['bootstrap'][0] }}"
  become: true
  become_user: solana

- name: Create vote account on bootstrap for this validator
  shell: |
    /usr/local/bin/solana create-vote-account \
      {{ keypair_path }}/validator-{{ inventory_hostname }}-vote-account.json \
      {{ keypair_path }}/validator-{{ inventory_hostname }}-identity.json \
      {{ bootstrap_pubkey_for_vote.stdout }} \
      --commission 10 \
      --keypair {{ keypair_path }}/identity.json \
      --url http://127.0.0.1:{{ rpc_port }} || true
  delegate_to: "{{ groups['bootstrap'][0] }}"
  become: true
  become_user: solana
  changed_when: false

- name: Copy keypairs to staging on bootstrap
  copy:
    src: "{{ keypair_path }}/validator-{{ inventory_hostname }}-{{ item }}.json"
    dest: "/tmp/keypairs/validator-{{ inventory_hostname }}-{{ item }}.json"
    remote_src: yes
    owner: solana
    group: solana
    mode: "0600"
  loop:
    - identity
    - vote-account
  delegate_to: "{{ groups['bootstrap'][0] }}"
  become: true

# ------------------------------------------------------------------
# Phase 2: Fetch keypairs and deploy validator
# ------------------------------------------------------------------
- name: Fetch validator identity keypair from bootstrap
  fetch:
    src: "/tmp/keypairs/validator-{{ inventory_hostname }}-identity.json"
    dest: "/tmp/fetched-keypairs/{{ inventory_hostname }}/"
    flat: yes
  delegate_to: "{{ groups['bootstrap'][0] }}"

- name: Fetch validator vote-account keypair from bootstrap
  fetch:
    src: "/tmp/keypairs/validator-{{ inventory_hostname }}-vote-account.json"
    dest: "/tmp/fetched-keypairs/{{ inventory_hostname }}/"
    flat: yes
  delegate_to: "{{ groups['bootstrap'][0] }}"

- name: Fetch genesis hash from bootstrap
  fetch:
    src: "/tmp/keypairs/genesis-hash.txt"
    dest: "/tmp/fetched-keypairs/genesis-hash.txt"
    flat: yes
  delegate_to: "{{ groups['bootstrap'][0] }}"
  run_once: true

- name: Fetch bootstrap identity pubkey from bootstrap
  fetch:
    src: "/tmp/keypairs/bootstrap-identity-pubkey.txt"
    dest: "/tmp/fetched-keypairs/bootstrap-identity-pubkey.txt"
    flat: yes
  delegate_to: "{{ groups['bootstrap'][0] }}"
  run_once: true

- name: Read genesis hash
  set_fact:
    genesis_hash: "{{ lookup('file', '/tmp/fetched-keypairs/genesis-hash.txt') }}"

- name: Read bootstrap identity pubkey
  set_fact:
    bootstrap_identity_pubkey: "{{ lookup('file', '/tmp/fetched-keypairs/bootstrap-identity-pubkey.txt') }}"

- name: Copy identity keypair to validator
  copy:
    src: "/tmp/fetched-keypairs/{{ inventory_hostname }}/validator-{{ inventory_hostname }}-identity.json"
    dest: "{{ keypair_path }}/identity.json"
    owner: solana
    group: solana
    mode: "0600"

- name: Copy vote-account keypair to validator
  copy:
    src: "/tmp/fetched-keypairs/{{ inventory_hostname }}/validator-{{ inventory_hostname }}-vote-account.json"
    dest: "{{ keypair_path }}/vote-account.json"
    owner: solana
    group: solana
    mode: "0600"

- name: Deploy validator systemd service
  template:
    src: solana-validator.service.j2
    dest: /etc/systemd/system/solana-validator.service
    owner: root
    group: root
    mode: "0644"

- name: Reload systemd daemon
  systemd:
    daemon_reload: yes

- name: Enable and start solana-validator
  systemd:
    name: solana-validator
    enabled: yes
    state: started

- name: Wait for validator to catch up
  shell: >
    /usr/local/bin/solana catchup
    --our-localhost
    --url http://{{ hostvars[groups['bootstrap'][0]]['private_ip'] }}:{{ rpc_port }}
    --follow
    2>&1 || true
  register: catchup_result
  until: catchup_result.rc == 0
  retries: 60
  delay: 10
  changed_when: false
  become: true
  become_user: solana
  ignore_errors: true

- name: Verify cluster has nodes
  shell: >
    /usr/local/bin/solana gossip
    --url http://{{ hostvars[groups['bootstrap'][0]]['private_ip'] }}:{{ rpc_port }}
  register: gossip_result
  changed_when: false
  become: true
  become_user: solana
  ignore_errors: true

- name: Display gossip nodes
  debug:
    msg: "{{ gossip_result.stdout_lines | default(['No output']) }}"
