---
all:
  vars:
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ~/.ssh/solana-cluster.pem
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
    ansible_python_interpreter: /usr/bin/python3

  children:
    bootstrap:
      hosts:
        bootstrap-validator:
          ansible_host: BOOTSTRAP_IP
          private_ip: BOOTSTRAP_PRIVATE_IP

    validators:
      hosts:
        validator-1:
          ansible_host: VALIDATOR_1_IP
          private_ip: VALIDATOR_1_PRIVATE_IP
        validator-2:
          ansible_host: VALIDATOR_2_IP
          private_ip: VALIDATOR_2_PRIVATE_IP
        validator-3:
          ansible_host: VALIDATOR_3_IP
          private_ip: VALIDATOR_3_PRIVATE_IP

    rpc:
      hosts:
        rpc-node:
          ansible_host: RPC_IP
          private_ip: RPC_PRIVATE_IP

    faucet:
      hosts:
        faucet-node:
          ansible_host: FAUCET_IP
          private_ip: FAUCET_PRIVATE_IP
