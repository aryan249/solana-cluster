apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: solana-private-cluster
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: solana-cluster
    app.kubernetes.io/managed-by: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/your-org/solana-cluster.git
    targetRevision: main
    path: argocd/manifests

  destination:
    server: https://kubernetes.default.svc
    namespace: solana-cluster

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  ignoreDifferences:
    - group: ""
      kind: ConfigMap
      jsonPointers:
        - /data/inventory
